<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CILE — Éditeur de plan de signalisation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
:root{
  --bg:#0b0b14;--surface:#111120;--surface2:#161628;--border:#1c1c35;
  --text:#c8c8d4;--dim:#4a4a6a;--accent:#4a90d9;--accent2:#3670b0;
  --navy:#0d2240;--blue:#14396a;--hi:rgba(255,160,40,.85);
  --r:5px;--font:'DM Sans',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:var(--font);color:var(--text);overflow:hidden;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

/* ── Header ── */
.hdr{height:42px;background:var(--navy);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06);}
.hdr-title{color:rgba(255,255,255,.9);font-size:13px;font-weight:700;letter-spacing:-.2px;}
.hdr-sub{color:rgba(255,255,255,.28);font-size:10px;font-weight:500;}
.hdr .sep{width:1px;height:18px;background:rgba(255,255,255,.08);}
.hdr-spacer{flex:1;}
.hb{padding:5px 14px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);transition:all .15s;letter-spacing:-.1px;}
.hb:hover{background:rgba(255,255,255,.12);color:#fff;}
.hb.accent{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.hb.accent:hover{background:var(--accent);}
.hb.warn{background:#a06010;border-color:#a06010;color:#fff;}

/* ── Toolbar ── */
.toolbar{display:flex;gap:5px;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap;flex-shrink:0;}
.tb{padding:4px 10px;border-radius:var(--r);font-size:10.5px;font-weight:600;cursor:pointer;font-family:var(--font);border:1px solid var(--border);background:var(--bg);color:var(--dim);transition:all .12s;letter-spacing:-.1px;}
.tb:hover{color:var(--text);border-color:#2a2a50;}
.tb.on{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.tbl{color:var(--dim);font-size:10px;font-weight:500;}
.tbi{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:var(--r);font-size:11px;font-family:var(--font);outline:none;width:240px;transition:border .15s;}
.tbi:focus{border-color:var(--accent);}
.tsep{width:1px;height:16px;background:var(--border);margin:0 2px;}

/* ── Main area ── */
.view-area{flex:1;display:flex;overflow:hidden;}

/* ── Maps panel (left) ── */
.maps-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.map-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.map-tab{flex:1;padding:7px;text-align:center;font-size:10px;font-weight:600;letter-spacing:.3px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.map-tab:hover{color:var(--text);}
.map-tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.map-frames{flex:1;position:relative;}
.map-frames iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.map-frames iframe.hidden{display:none;}

/* ── Editor panel (right) ── */
.editor-panel{display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow:hidden;}

/* ── Tool rail (thin vertical strip inside editor) ── */
.tool-rail{width:40px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:5px 0;gap:1px;flex-shrink:0;overflow-y:auto;}
.rail-sep{width:24px;height:1px;background:var(--border);margin:3px 0;}
.rb{width:30px;height:26px;border-radius:4px;border:none;background:transparent;color:var(--dim);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;position:relative;}
.rb:hover{background:rgba(255,255,255,.04);color:var(--text);}
.rb.on{background:var(--accent2);color:#fff;}
.rb .tip{display:none;position:absolute;left:36px;top:50%;transform:translateY(-50%);background:#1a1a30;color:#bbc;padding:3px 8px;border-radius:4px;font-size:9px;white-space:nowrap;pointer-events:none;z-index:99;border:1px solid var(--border);}
.rb:hover .tip{display:block;}

/* ── Editor content (right of tool rail) ── */
.editor-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── Gallery (horizontal strip) ── */
.gallery-bar{display:flex;align-items:center;gap:5px;padding:5px 8px;border-bottom:1px solid var(--border);min-height:60px;overflow-x:auto;flex-shrink:0;background:var(--bg);}
.gallery-bar:empty::after{content:"Aucun plan.";color:var(--dim);font-size:10px;}
.gi{width:80px;height:48px;border-radius:4px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;flex-shrink:0;position:relative;transition:all .12s;}
.gi:hover{border-color:var(--accent);}
.gi.on{border-color:var(--hi);box-shadow:0 0 8px rgba(255,160,40,.15);}
.gi img,.gi canvas{width:100%;height:100%;object-fit:cover;}
.gi .gi-del{position:absolute;top:1px;right:1px;width:13px;height:13px;border-radius:50%;background:rgba(180,40,40,.85);color:#fff;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .12s;}
.gi:hover .gi-del{opacity:1;}
.gi .gi-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:rgba(255,255,255,.8);font-size:6.5px;padding:1px 3px;text-align:center;font-weight:500;}
.gi .gi-badge{position:absolute;top:1px;left:1px;background:var(--accent2);color:#fff;font-size:5.5px;padding:1px 3px;border-radius:2px;font-weight:700;letter-spacing:.3px;}

/* ── Canvas ── */
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;background:var(--bg);position:relative;padding:6px;}
.canvas-area canvas{border-radius:3px;max-width:100%;max-height:100%;}
.canvas-hint{position:absolute;color:#2a2a40;font-size:12px;text-align:center;line-height:2;pointer-events:none;font-weight:500;}

/* ── Right sidebar (signs) — collapsible ── */
.sign-sidebar{width:210px;background:var(--surface2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .2s,opacity .2s;}
.sign-sidebar.closed{width:0;opacity:0;border:none;}
.ss-header{padding:7px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--dim);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.ss-header button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;padding:2px 4px;border-radius:3px;}
.ss-header button:hover{color:var(--text);background:rgba(255,255,255,.05);}
.ss-body{flex:1;overflow-y:auto;padding:0;}
/* Accordion */
.acc{border-bottom:1px solid var(--border);}
.acc-head{padding:6px 10px;font-size:9px;font-weight:600;color:var(--dim);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:color .1s;}
.acc-head:hover{color:var(--text);}
.acc-body{display:none;padding:4px 8px 6px;}
.acc.open .acc-body{display:flex;flex-wrap:wrap;gap:3px;}
.acc.open .acc-head{color:var(--text);}
.acc-head .arr{font-size:7px;transition:transform .15s;}
.acc.open .acc-head .arr{transform:rotate(90deg);}
.sc{width:30px;height:30px;border:1px solid var(--border);border-radius:3px;background:var(--bg);cursor:pointer;padding:1px;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.sc:hover{border-color:var(--accent);}
.sc.on{border-color:var(--hi);background:#2a1e00;}
.sc canvas{width:100%;height:100%;}
/* Controls row */
.ss-controls{padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg);}
.ss-controls label{font-size:9px;color:var(--dim);font-weight:500;display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.ss-controls input[type=range]{flex:1;accent-color:var(--accent);height:3px;}
.ss-controls input[type=color]{width:20px;height:18px;border:1px solid var(--border);border-radius:3px;padding:0;cursor:pointer;}
.ss-controls input[type=number]{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:2px 4px;border-radius:3px;font-size:9px;font-family:var(--font);outline:none;width:38px;}

/* ── Status bar ── */
.bar{height:20px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;font-size:9px;color:var(--dim);gap:14px;flex-shrink:0;font-weight:500;}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="hdr">
  <span class="hdr-title">Éditeur de signalisation</span>
  <span class="hdr-sub">CILE Voirie</span>
  <div class="sep"></div>
  <span class="tbl">Adresse</span>
  <input class="tbi" id="addr" placeholder="Rue Louvrex 12, 4000 Liège" style="width:200px">
  <button class="hb" onclick="goAddr()">Charger</button>
  <div class="sep"></div>
  <label class="hb warn" style="cursor:pointer">Capture<input type="file" accept="image/*" multiple style="display:none" onchange="loadFiles(event)"></label>
  <button class="hb accent" onclick="addSchemaCapture()">Plan coté</button>
  <div class="hdr-spacer"></div>
  <button class="hb" onclick="exportAll()">Exporter</button>
</div>

<!-- ═══ MODE TOOLBAR ═══ -->
<div class="toolbar">
  <button class="tb on" id="modeCartes" onclick="setMode('cartes')">Cartes</button>
  <button class="tb" id="modeEditeur" onclick="setMode('editeur')">Éditeur</button>
  <button class="tb" id="modeBoth" onclick="setMode('both')">Côte à côte</button>
</div>

<!-- ═══ MAIN ═══ -->
<div class="view-area">

  <!-- Maps (left) -->
  <div class="maps-panel" id="mapsPanel">
    <div class="map-tabs">
      <div class="map-tab on" id="tab_map" onclick="showTab('map')">Maps</div>
      <div class="map-tab" id="tab_sv" onclick="showTab('sv')">Street View</div>
      <div class="map-tab" id="tab_both" onclick="showTab('both')">Les deux</div>
    </div>
    <div class="map-frames" id="frames">
      <iframe id="ifMap" src="about:blank"></iframe>
      <iframe id="ifSV" src="about:blank" class="hidden"></iframe>
    </div>
  </div>

  <!-- Editor (right) -->
  <div class="editor-panel" id="editorPanel">
    <div style="flex:1;display:flex;overflow:hidden;">

      <!-- Tool rail -->
      <div class="tool-rail" id="toolRail">
        <button class="rb on" data-tool="select" onclick="setTool('select')"><span class="tip">Sélection (V)</span>↖</button>
        <div class="rail-sep"></div>
        <button class="rb" data-tool="line" onclick="setTool('line')"><span class="tip">Ligne (L)</span>╱</button>
        <button class="rb" data-tool="dashline" onclick="setTool('dashline')"><span class="tip">Tiretée</span>┄</button>
        <button class="rb" data-tool="rect" onclick="setTool('rect')"><span class="tip">Rectangle (R)</span>▭</button>
        <button class="rb" data-tool="fillrect" onclick="setTool('fillrect')"><span class="tip">Rect. plein</span>▬</button>
        <button class="rb" data-tool="hatch" onclick="setTool('hatch')"><span class="tip">Hachuré</span>▧</button>
        <div class="rail-sep"></div>
        <button class="rb" data-tool="barrier" onclick="setTool('barrier')"><span class="tip">Barrière (B)</span>🚧</button>
        <button class="rb" data-tool="cones" onclick="setTool('cones')"><span class="tip">Balisage</span>🔶</button>
        <button class="rb" data-tool="dimension" onclick="setTool('dimension')"><span class="tip">Cote (D)</span>📏</button>
        <button class="rb" data-tool="arrow" onclick="setTool('arrow')"><span class="tip">Flèche</span>➡</button>
        <button class="rb" data-tool="text" onclick="setTool('text')"><span class="tip">Texte (T)</span>A</button>
        <div class="rail-sep"></div>
        <button class="rb" onclick="undoAction()"><span class="tip">Annuler</span>↩</button>
        <button class="rb" onclick="clearAll()"><span class="tip">Effacer tout</span>🗑</button>
        <div style="flex:1"></div>
        <button class="rb" id="btnGrid" onclick="toggleGrid()" style="color:var(--accent);font-size:10px"><span class="tip">Grille</span>#</button>
        <button class="rb" id="btnSigns" onclick="toggleSignbar()"><span class="tip">Panneaux</span>◧</button>
      </div>

      <!-- Editor center -->
      <div class="editor-content">
        <div class="gallery-bar" id="gallery"></div>
        <div class="canvas-area" id="cArea">
          <canvas id="C" width="800" height="600"></canvas>
          <div class="canvas-hint" id="cHint">Chargez une capture ou créez un plan coté</div>
        </div>
      </div>

      <!-- Sign sidebar -->
      <div class="sign-sidebar" id="signSidebar">
        <div class="ss-header">
          <span>Panneaux</span>
          <button onclick="toggleSignbar()">✕</button>
        </div>
        <div class="ss-controls">
          <label>Taille <input type="range" id="sR" min="20" max="160" value="60" oninput="sSize=+this.value"><span id="sRV" style="width:18px;text-align:right;font-size:9px">60</span></label>
          <label>Rotation <input type="range" id="rR" min="-180" max="180" value="0" oninput="sRot=+this.value;document.getElementById('rRV').textContent=this.value+'°'"><span id="rRV" style="width:24px;text-align:right;font-size:9px">0°</span></label>
          <label>Couleur <input type="color" id="drawColor" value="#222222"> Trait <input type="number" id="drawWidth" value="2" min="1" max="12"> Texte <input type="number" id="drawFontSize" value="14" min="6" max="48"></label>
        </div>
        <div class="ss-body" id="signAccordion"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ STATUS ═══ -->
<div class="bar">
  <span id="sH">Prêt</span>
  <span style="flex:1"></span>
  <span id="sCoords"></span>
</div>

<script>
// ═══════════════════════════════════════
// SIGNS DB
// ═══════════════════════════════════════
const IMG_BASE="https://valentinangenot.github.io/cile-voirie/";
const SIGNS=[
{id:"A1a",n:"Virage G",cat:"Danger"},{id:"A1b",n:"Virage D",cat:"Danger"},
{id:"A7a",n:"Rétréc. 2 côtés",cat:"Danger"},{id:"A7b",n:"Rétréc. D",cat:"Danger"},{id:"A7c",n:"Rétréc. G",cat:"Danger"},
{id:"A13",n:"Traversée enfants",cat:"Danger"},{id:"A14",n:"Chaussée glissante",cat:"Danger"},
{id:"A23",n:"Feux",cat:"Danger"},{id:"A25 color",n:"Cyclistes",cat:"Danger"},
{id:"A31",n:"Travaux",cat:"Danger"},{id:"A37",n:"Dos d'âne",cat:"Danger"},
{id:"A39",n:"Piétons",cat:"Danger"},{id:"A49",n:"Carrefour dang.",cat:"Danger"},
{id:"A50",n:"Circ. 2 sens",cat:"Danger"},{id:"A51",n:"Danger (!)",cat:"Danger"},
{id:"B1",n:"Cédez le passage",cat:"Priorité"},{id:"B3",n:"Route prioritaire",cat:"Priorité"},
{id:"B5",n:"Stop",cat:"Priorité"},{id:"B9",n:"Priorité sens inv.",cat:"Priorité"},
{id:"B19",n:"Passage étroit — céder",cat:"Priorité"},{id:"B21",n:"Passage étroit — prio.",cat:"Priorité"},
{id:"C1",n:"Sens interdit",cat:"Interdiction"},{id:"C3",n:"Accès interdit",cat:"Interdiction"},
{id:"C21",n:"Stat. interdit",cat:"Interdiction"},{id:"C23",n:"Arrêt+stat. int.",cat:"Interdiction"},
{id:"C31a",n:"Int. tourner G",cat:"Interdiction"},{id:"C31b",n:"Int. tourner D",cat:"Interdiction"},
{id:"C35",n:"Dépassement int.",cat:"Interdiction"},
{id:"C43 20kmh",n:"20 km/h",cat:"Vitesse"},{id:"C43 30kmh",n:"30 km/h",cat:"Vitesse"},
{id:"C43 50kmh",n:"50 km/h",cat:"Vitesse"},{id:"C43 70kmh",n:"70 km/h",cat:"Vitesse"},
{id:"C43 90kmh",n:"90 km/h",cat:"Vitesse"},
{id:"C45 30kmh",n:"Fin 30",cat:"Vitesse"},{id:"C45 50kmh",n:"Fin 50",cat:"Vitesse"},
{id:"C45 70kmh",n:"Fin 70",cat:"Vitesse"},{id:"C46",n:"Fin toutes int.",cat:"Vitesse"},
{id:"D1a",n:"Oblig. G",cat:"Obligation"},{id:"D1b",n:"Tout droit",cat:"Obligation"},
{id:"D1c",n:"D ou G",cat:"Obligation"},{id:"D1d",n:"Droit ou D",cat:"Obligation"},
{id:"D1f",n:"Oblig. D",cat:"Obligation"},{id:"D3a",n:"Contourner D",cat:"Obligation"},
{id:"D3b",n:"Contourner G",cat:"Obligation"},
{id:"F47",n:"Fin prescriptions",cat:"Indication"},
{id:"F79c",n:"Rue cyclable",cat:"Indication"},{id:"F79d",n:"Fin rue cyclable",cat:"Indication"},
{id:"E9a",n:"Parking",cat:"Stationnement"},{id:"E9a Disque",n:"Zone bleue",cat:"Stationnement"},
{id:"Radar 900x900",n:"Radar",cat:"Spécial"},{id:"Radar chantier",n:"Radar chantier",cat:"Spécial"},
{id:"Tirette",n:"Tirette",cat:"Spécial"},{id:"Tirette orange",n:"Tirette orange",cat:"Spécial"},
{id:"Pentes danger",n:"Pentes danger",cat:"Spécial"},
];
const CATS=[...new Set(SIGNS.map(s=>s.cat))];

const cache={};
function prerender(){return Promise.all(SIGNS.map(s=>new Promise(ok=>{const img=new Image();img.crossOrigin="anonymous";img.onload=()=>{const c=document.createElement("canvas");c.width=120;c.height=120;const sc=Math.min(120/img.width,120/img.height);c.getContext("2d").drawImage(img,(120-img.width*sc)/2,(120-img.height*sc)/2,img.width*sc,img.height*sc);cache[s.id]=c;ok();};img.onerror=()=>ok();img.src=IMG_BASE+encodeURIComponent(s.id)+".png";})));}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let captures=[],activeCapture=null,sSize=60,sRot=0,sel=null;
let dragging=null,dragOff={x:0,y:0};
let drawTool="select",drawStart=null,drawPreview=null;
let selectedShape=null,movingShape=false,moveOff={x:0,y:0};
let gridOn=true;
const cvs=document.getElementById("C"),ctx=cvs.getContext("2d");
const GRID=15;
function snap(v){return gridOn?Math.round(v/GRID)*GRID:v;}
function snapPt(x,y){return{x:snap(x),y:snap(y)};}

// ═══════════════════════════════════════
// LAYOUT — modes (original behavior)
// ═══════════════════════════════════════
function setMode(m){
  const mp=document.getElementById("mapsPanel"),ep=document.getElementById("editorPanel");
  document.getElementById("modeCartes").classList.toggle("on",m==="cartes");
  document.getElementById("modeEditeur").classList.toggle("on",m==="editeur");
  document.getElementById("modeBoth").classList.toggle("on",m==="both");
  if(m==="cartes"){mp.style.display="flex";mp.style.flex="1";ep.style.display="none";}
  else if(m==="editeur"){mp.style.display="none";ep.style.display="flex";ep.style.flex="1";ep.style.width="auto";}
  else{mp.style.display="flex";mp.style.flex="1";ep.style.display="flex";ep.style.flex="1";ep.style.width="auto";}
}
function showTab(tab){
  document.querySelectorAll(".map-tab").forEach(t=>t.classList.remove("on"));
  document.getElementById("tab_"+tab).classList.add("on");
  const fm=document.getElementById("ifMap"),fs=document.getElementById("ifSV");
  fm.classList.add("hidden");fs.classList.add("hidden");fm.style.left="0";fm.style.width="100%";fs.style.left="0";fs.style.width="100%";
  if(tab==="map")fm.classList.remove("hidden");
  else if(tab==="sv")fs.classList.remove("hidden");
  else{fm.classList.remove("hidden");fs.classList.remove("hidden");fm.style.width="50%";fs.style.width="50%";fs.style.left="50%";}
}
function toggleGrid(){gridOn=!gridOn;document.getElementById("btnGrid").classList.toggle("on",gridOn);render();}
function toggleSignbar(){document.getElementById("signSidebar").classList.toggle("closed");}
function goAddr(){
  const a=document.getElementById("addr").value.trim();if(!a)return;
  document.getElementById("sH").textContent="Géocodage…";
  setMode("both");
  fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(a+", Belgique")}&format=json&limit=1`,{headers:{"Accept-Language":"fr"}})
  .then(r=>r.json()).then(d=>{
    if(!d.length){document.getElementById("sH").textContent="Adresse introuvable.";return;}
    const lat=d[0].lat,lon=d[0].lon;
    document.getElementById("ifMap").src=`https://maps.google.com/maps?q=${lat},${lon}&z=18&output=embed`;
    document.getElementById("ifSV").src=`https://maps.google.com/maps?q=${lat},${lon}&layer=c&cbll=${lat},${lon}&cbp=11,0,0,0,0&output=svembed`;
    document.getElementById("sH").textContent="Vue chargée — capturez l'écran puis importez";
  }).catch(()=>document.getElementById("sH").textContent="Erreur réseau.");
}

// ═══════════════════════════════════════
// TOOL RAIL
// ═══════════════════════════════════════
function setTool(t){
  drawTool=t;sel=null;selectedShape=null;drawStart=null;drawPreview=null;
  document.querySelectorAll(".rb[data-tool]").forEach(b=>b.classList.toggle("on",b.dataset.tool===t));
  renderSignAccordion();
  cvs.style.cursor=t==="select"?"default":t==="text"?"text":"crosshair";
  const tips={select:"Sélection — clic déplacer, double-clic supprimer",line:"Ligne",dashline:"Tiretée",rect:"Rectangle",fillrect:"Rectangle plein",hatch:"Hachuré",barrier:"Barrière",cones:"Balisage",dimension:"Cote — entrez la distance",arrow:"Flèche",text:"Texte — cliquez pour placer"};
  document.getElementById("sH").textContent=tips[t]||"";
}

// ═══════════════════════════════════════
// SIGN ACCORDION
// ═══════════════════════════════════════
function renderSignAccordion(){
  const a=document.getElementById("signAccordion");a.innerHTML="";
  CATS.forEach((cat,ci)=>{
    const signs=SIGNS.filter(s=>s.cat===cat);
    const sec=document.createElement("div");sec.className="acc"+(ci===0?" open":"");
    sec.innerHTML=`<div class="acc-head" onclick="this.parentElement.classList.toggle('open')"><span>${cat}</span><span class="arr">▶</span></div>`;
    const body=document.createElement("div");body.className="acc-body";
    signs.forEach(s=>{
      const d=document.createElement("div");d.className="sc"+(sel===s.id?" on":"");d.title=`${s.id} — ${s.n}`;
      if(cache[s.id]){const cv=document.createElement("canvas");cv.width=30;cv.height=30;cv.getContext("2d").drawImage(cache[s.id],0,0,30,30);d.appendChild(cv);}
      d.onclick=()=>{sel=s.id;drawTool="sign";document.querySelectorAll(".rb[data-tool]").forEach(b=>b.classList.remove("on"));renderSignAccordion();cvs.style.cursor="copy";document.getElementById("sH").textContent=`${s.id} — ${s.n}`;};
      body.appendChild(d);
    });
    sec.appendChild(body);a.appendChild(sec);
  });
}

// ═══════════════════════════════════════
// FILES
// ═══════════════════════════════════════
function loadFiles(e){Array.from(e.target.files).forEach(f=>{if(!f.type.startsWith("image/"))return;const r=new FileReader();r.onload=()=>addCapture(r.result,f.name);r.readAsDataURL(f);});e.target.value="";}
function addCapture(du,fn){const id="c"+Date.now()+Math.random().toString(36).slice(2,5);captures.push({id,type:"screenshot",dataUrl:du,signs:[],label:fn?fn.replace(/\.[^.]+$/,""):"Capture "+(captures.length+1)});renderGallery();selectCapture(id);syncToMainForm();}
function addSchemaCapture(){const id="s"+Date.now();captures.push({id,type:"schema",label:"Plan "+(captures.filter(c=>c.type==="schema").length+1),signs:[],shapes:[]});renderGallery();selectCapture(id);if(document.getElementById("modeCartes").classList.contains("on"))setMode("editeur");document.getElementById("sH").textContent="Plan coté — tracez routes, barrières, cotations…";}

// ═══════════════════════════════════════
// GALLERY
// ═══════════════════════════════════════
function renderGallery(){
  const g=document.getElementById("gallery");g.innerHTML="";
  captures.forEach(c=>{
    const d=document.createElement("div");d.className="gi"+(activeCapture===c.id?" on":"");
    if(c.type==="schema"){
      const mc=document.createElement("canvas");mc.width=80;mc.height=48;const mx=mc.getContext("2d");
      mx.fillStyle="#fff";mx.fillRect(0,0,80,48);mx.strokeStyle="#ccc";mx.lineWidth=1;
      mx.beginPath();mx.moveTo(30,3);mx.lineTo(30,45);mx.moveTo(50,3);mx.lineTo(50,45);mx.stroke();
      mx.setLineDash([2,2]);mx.strokeStyle="#aaa";mx.beginPath();mx.moveTo(40,3);mx.lineTo(40,45);mx.stroke();
      d.innerHTML=`<div class="gi-del" onclick="event.stopPropagation();delCapture('${c.id}')">×</div><div class="gi-badge">PLAN</div><div class="gi-label">${c.label}</div>`;
      d.prepend(mc);
    } else {
      d.innerHTML=`<img src="${c.dataUrl}"><div class="gi-del" onclick="event.stopPropagation();delCapture('${c.id}')">×</div><div class="gi-label">${c.label}</div>`;
    }
    d.onclick=()=>selectCapture(c.id);g.appendChild(d);
  });
}
function selectCapture(id){
  activeCapture=id;const cap=captures.find(c=>c.id===id);if(!cap)return;
  document.getElementById("cHint").style.display="none";
  if(cap.type==="schema"){cvs.width=1200;cvs.height=900;setTool("select");}
  else{const img=new Image();img.onload=()=>{cvs.width=img.width;cvs.height=img.height;render();};img.src=cap.dataUrl;}
  render();renderGallery();
}
function delCapture(id){captures=captures.filter(c=>c.id!==id);if(activeCapture===id){activeCapture=null;ctx.clearRect(0,0,cvs.width,cvs.height);document.getElementById("cHint").style.display="";}renderGallery();syncToMainForm();}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(){const cap=captures.find(c=>c.id===activeCapture);if(!cap)return;cap.type==="schema"?renderSchema(cap):renderScreenshot(cap);}
function renderScreenshot(cap){const img=new Image();img.onload=()=>{ctx.clearRect(0,0,cvs.width,cvs.height);ctx.drawImage(img,0,0,cvs.width,cvs.height);cap.signs.forEach(s=>{const si=cache[s.id];if(!si)return;ctx.save();ctx.translate(s.x,s.y);ctx.rotate((s.angle||0)*Math.PI/180);ctx.drawImage(si,-s.size/2,-s.size/2,s.size,s.size);ctx.restore();});};img.src=cap.dataUrl;}
function renderSchema(cap){
  const W=cvs.width,H=cvs.height;ctx.clearRect(0,0,W,H);ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);
  if(gridOn){ctx.strokeStyle="#ededf4";ctx.lineWidth=.4;for(let x=0;x<=W;x+=GRID){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}for(let y=0;y<=H;y+=GRID){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}}
  cap.shapes.forEach((sh,i)=>drawShape(sh,i===selectedShape));
  if(drawPreview)drawShape(drawPreview,false,true);
  cap.signs.forEach(s=>{const si=cache[s.id];if(!si)return;ctx.save();ctx.translate(s.x,s.y);ctx.rotate((s.angle||0)*Math.PI/180);ctx.drawImage(si,-s.size/2,-s.size/2,s.size,s.size);ctx.restore();ctx.fillStyle="#14396a";ctx.font="600 8px 'DM Sans'";ctx.textAlign="center";ctx.fillText(s.id,s.x,s.y+s.size/2+10);ctx.textAlign="left";});
}

// ═══════════════════════════════════════
// DRAW SHAPE
// ═══════════════════════════════════════
function drawShape(sh,isSel,isPrev){
  ctx.save();ctx.globalAlpha=isPrev?.45:1;const lw=sh.lineWidth||2,col=sh.color||"#222";
  switch(sh.tool){
  case"line":ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(sh.x1,sh.y1);ctx.lineTo(sh.x2,sh.y2);ctx.stroke();break;
  case"dashline":ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash([8,5]);ctx.beginPath();ctx.moveTo(sh.x1,sh.y1);ctx.lineTo(sh.x2,sh.y2);ctx.stroke();ctx.setLineDash([]);break;
  case"rect":ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.strokeRect(Math.min(sh.x1,sh.x2),Math.min(sh.y1,sh.y2),Math.abs(sh.x2-sh.x1),Math.abs(sh.y2-sh.y1));break;
  case"fillrect":{const x=Math.min(sh.x1,sh.x2),y=Math.min(sh.y1,sh.y2),w=Math.abs(sh.x2-sh.x1),h=Math.abs(sh.y2-sh.y1);ctx.fillStyle=col;ctx.globalAlpha=isPrev?.15:.2;ctx.fillRect(x,y,w,h);ctx.globalAlpha=isPrev?.45:1;ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.strokeRect(x,y,w,h);break;}
  case"hatch":{const x=Math.min(sh.x1,sh.x2),y=Math.min(sh.y1,sh.y2),w=Math.abs(sh.x2-sh.x1),h=Math.abs(sh.y2-sh.y1);ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();ctx.strokeStyle=col;ctx.lineWidth=1;ctx.globalAlpha=.3;for(let d=-Math.max(w,h);d<Math.max(w,h)*2;d+=10){ctx.beginPath();ctx.moveTo(x+d,y);ctx.lineTo(x+d-h,y+h);ctx.stroke();}ctx.restore();ctx.globalAlpha=isPrev?.45:1;ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.strokeRect(x,y,w,h);break;}
  case"barrier":{const dx=sh.x2-sh.x1,dy=sh.y2-sh.y1,len=Math.hypot(dx,dy);if(len<2)break;const ang=Math.atan2(dy,dx),bh=8;ctx.save();ctx.translate(sh.x1,sh.y1);ctx.rotate(ang);ctx.beginPath();ctx.rect(0,-bh/2,len,bh);ctx.clip();for(let i=-2;i<len/7+2;i++){ctx.fillStyle=i%2===0?"#cc2200":"#fff";ctx.beginPath();ctx.moveTo(i*7,-bh/2);ctx.lineTo(i*7+7,-bh/2);ctx.lineTo(i*7+7-bh,bh/2);ctx.lineTo(i*7-bh,bh/2);ctx.closePath();ctx.fill();}ctx.restore();ctx.save();ctx.translate(sh.x1,sh.y1);ctx.rotate(ang);ctx.strokeStyle="#900";ctx.lineWidth=1;ctx.strokeRect(0,-bh/2,len,bh);ctx.restore();break;}
  case"cones":{const dx=sh.x2-sh.x1,dy=sh.y2-sh.y1,len=Math.hypot(dx,dy);if(len<2)break;const n=Math.max(2,Math.round(len/20));ctx.fillStyle="#e88a00";for(let i=0;i<=n;i++){const t=i/n;ctx.beginPath();ctx.arc(sh.x1+dx*t,sh.y1+dy*t,3.5,0,Math.PI*2);ctx.fill();}break;}
  case"dimension":{const dx=sh.x2-sh.x1,dy=sh.y2-sh.y1,len=Math.hypot(dx,dy);if(len<5)break;const ang=Math.atan2(dy,dx);ctx.strokeStyle="#555";ctx.lineWidth=.8;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(sh.x1,sh.y1);ctx.lineTo(sh.x2,sh.y2);ctx.stroke();const px=Math.cos(ang+Math.PI/2)*5,py=Math.sin(ang+Math.PI/2)*5;ctx.beginPath();ctx.moveTo(sh.x1-px,sh.y1-py);ctx.lineTo(sh.x1+px,sh.y1+py);ctx.stroke();ctx.beginPath();ctx.moveTo(sh.x2-px,sh.y2-py);ctx.lineTo(sh.x2+px,sh.y2+py);ctx.stroke();const ax=Math.cos(ang)*7,ay=Math.sin(ang)*7;ctx.fillStyle="#555";ctx.beginPath();ctx.moveTo(sh.x1,sh.y1);ctx.lineTo(sh.x1+ax+py*.35,sh.y1+ay-px*.35);ctx.lineTo(sh.x1+ax-py*.35,sh.y1+ay+px*.35);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(sh.x2,sh.y2);ctx.lineTo(sh.x2-ax+py*.35,sh.y2-ay-px*.35);ctx.lineTo(sh.x2-ax-py*.35,sh.y2-ay+px*.35);ctx.closePath();ctx.fill();const mx=(sh.x1+sh.x2)/2,my=(sh.y1+sh.y2)/2,txt=sh.text||"";ctx.font=`600 ${sh.fontSize||11}px 'DM Sans'`;const tm=ctx.measureText(txt);ctx.save();ctx.translate(mx,my);let ra=ang;if(ra>Math.PI/2||ra<-Math.PI/2)ra+=Math.PI;ctx.rotate(ra);ctx.fillStyle="#fff";ctx.fillRect(-tm.width/2-3,-7,tm.width+6,14);ctx.fillStyle="#333";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(txt,0,0);ctx.restore();break;}
  case"arrow":{const dx=sh.x2-sh.x1,dy=sh.y2-sh.y1,len=Math.hypot(dx,dy);if(len<5)break;const ang=Math.atan2(dy,dx);ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(sh.x1,sh.y1);ctx.lineTo(sh.x2,sh.y2);ctx.stroke();ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(sh.x2,sh.y2);ctx.lineTo(sh.x2-Math.cos(ang-.4)*11,sh.y2-Math.sin(ang-.4)*11);ctx.lineTo(sh.x2-Math.cos(ang+.4)*11,sh.y2-Math.sin(ang+.4)*11);ctx.closePath();ctx.fill();break;}
  case"text":ctx.fillStyle=col;ctx.font=`500 ${sh.fontSize||14}px 'DM Sans'`;ctx.textAlign="left";ctx.textBaseline="top";ctx.fillText(sh.text||"",sh.x1,sh.y1);break;
  }
  if(isSel&&!isPrev){const bb=shapeBBox(sh);ctx.strokeStyle="var(--accent)";ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.strokeRect(bb.x-3,bb.y-3,bb.w+6,bb.h+6);ctx.setLineDash([]);}
  ctx.restore();
}
function shapeBBox(sh){if(sh.tool==="text"){ctx.font=`500 ${sh.fontSize||14}px 'DM Sans'`;const m=ctx.measureText(sh.text||"T");return{x:sh.x1,y:sh.y1,w:m.width,h:sh.fontSize||14};}const x=Math.min(sh.x1,sh.x2),y=Math.min(sh.y1,sh.y2);return{x,y,w:Math.abs(sh.x2-sh.x1)||10,h:Math.abs(sh.y2-sh.y1)||10};}
function hitTestShape(shapes,px,py){for(let i=shapes.length-1;i>=0;i--){const b=shapeBBox(shapes[i]);if(px>=b.x-5&&px<=b.x+b.w+5&&py>=b.y-5&&py<=b.y+b.h+5)return i;}return-1;}

// ═══════════════════════════════════════
// CANVAS EVENTS
// ═══════════════════════════════════════
function xy(e){const r=cvs.getBoundingClientRect();return{x:(e.clientX-r.left)*(cvs.width/r.width),y:(e.clientY-r.top)*(cvs.height/r.height)};}
function hitSign(cap,x,y){for(let i=cap.signs.length-1;i>=0;i--){const s=cap.signs[i];if(Math.abs(x-s.x)<s.size/2&&Math.abs(y-s.y)<s.size/2)return i;}return-1;}

cvs.addEventListener("mousemove",e=>{
  const pt=xy(e);document.getElementById("sCoords").textContent=`${Math.round(pt.x)}, ${Math.round(pt.y)}`;
  const cap=captures.find(c=>c.id===activeCapture);if(!cap)return;
  if(dragging!==null){const sp=cap.type==="schema"?snapPt(pt.x+dragOff.x,pt.y+dragOff.y):{x:pt.x+dragOff.x,y:pt.y+dragOff.y};cap.signs[dragging].x=sp.x;cap.signs[dragging].y=sp.y;render();return;}
  if(movingShape&&selectedShape!==null&&cap.type==="schema"){const sh=cap.shapes[selectedShape];const dx=pt.x-moveOff.x-sh.x1,dy=pt.y-moveOff.y-sh.y1;const sp=snapPt(sh.x1+dx,sh.y1+dy);const ddx=sp.x-sh.x1,ddy=sp.y-sh.y1;sh.x1+=ddx;sh.y1+=ddy;sh.x2+=ddx;sh.y2+=ddy;moveOff={x:pt.x-sh.x1,y:pt.y-sh.y1};render();return;}
  if(drawStart&&cap.type==="schema"){const sp=snapPt(pt.x,pt.y);drawPreview={tool:drawTool,x1:drawStart.x,y1:drawStart.y,x2:sp.x,y2:sp.y,color:document.getElementById("drawColor").value,lineWidth:+document.getElementById("drawWidth").value,fontSize:+document.getElementById("drawFontSize").value};render();}
});
cvs.addEventListener("mousedown",e=>{
  const cap=captures.find(c=>c.id===activeCapture);if(!cap)return;const pt=xy(e);
  if(cap.type==="schema"){
    const sp=snapPt(pt.x,pt.y);
    if(sel&&drawTool==="sign"){cap.signs.push({id:sel,x:sp.x,y:sp.y,size:sSize,angle:sRot});render();syncToMainForm();return;}
    if(drawTool==="select"){const si=hitSign(cap,pt.x,pt.y);if(si>=0){selectedShape=null;dragging=si;dragOff={x:cap.signs[si].x-pt.x,y:cap.signs[si].y-pt.y};cvs.style.cursor="grabbing";render();return;}const hi=hitTestShape(cap.shapes,pt.x,pt.y);if(hi>=0){selectedShape=hi;movingShape=true;moveOff={x:pt.x-cap.shapes[hi].x1,y:pt.y-cap.shapes[hi].y1};cvs.style.cursor="grabbing";render();return;}selectedShape=null;render();return;}
    if(drawTool==="text"){const txt=prompt("Texte :");if(txt){cap.shapes.push({tool:"text",x1:sp.x,y1:sp.y,x2:sp.x,y2:sp.y,text:txt,color:document.getElementById("drawColor").value,fontSize:+document.getElementById("drawFontSize").value});render();syncToMainForm();}return;}
    drawStart=sp;return;
  }
  if(sel){cap.signs.push({id:sel,x:pt.x,y:pt.y,size:sSize,angle:sRot});render();syncToMainForm();return;}
  const si=hitSign(cap,pt.x,pt.y);if(si>=0){dragging=si;dragOff={x:cap.signs[si].x-pt.x,y:cap.signs[si].y-pt.y};cvs.style.cursor="grabbing";}
});
cvs.addEventListener("mouseup",e=>{
  const cap=captures.find(c=>c.id===activeCapture);if(!cap)return;const pt=xy(e);
  if(dragging!==null){dragging=null;cvs.style.cursor=sel?"copy":"default";syncToMainForm();return;}
  if(movingShape){movingShape=false;cvs.style.cursor="default";syncToMainForm();return;}
  if(drawStart&&cap.type==="schema"){const sp=snapPt(pt.x,pt.y);const dx=sp.x-drawStart.x,dy=sp.y-drawStart.y;
    if(Math.abs(dx)>3||Math.abs(dy)>3){const sh={tool:drawTool,x1:drawStart.x,y1:drawStart.y,x2:sp.x,y2:sp.y,color:document.getElementById("drawColor").value,lineWidth:+document.getElementById("drawWidth").value,fontSize:+document.getElementById("drawFontSize").value};if(drawTool==="dimension"){const len=Math.hypot(dx,dy);sh.text=prompt("Distance :",Math.round(len)+" m")||Math.round(len)+" m";}cap.shapes.push(sh);syncToMainForm();}
    drawStart=null;drawPreview=null;render();}
});
cvs.addEventListener("dblclick",e=>{
  const cap=captures.find(c=>c.id===activeCapture);if(!cap)return;const pt=xy(e);
  if(cap.type==="schema"&&drawTool==="select"){const si=hitSign(cap,pt.x,pt.y);if(si>=0){cap.signs.splice(si,1);render();syncToMainForm();return;}const hi=hitTestShape(cap.shapes,pt.x,pt.y);if(hi>=0){cap.shapes.splice(hi,1);selectedShape=null;render();syncToMainForm();return;}}
  if(cap.type!=="schema"){const si=hitSign(cap,pt.x,pt.y);if(si>=0){cap.signs.splice(si,1);render();syncToMainForm();}}
});
cvs.addEventListener("contextmenu",e=>{e.preventDefault();sel=null;setTool("select");});
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT"||e.target.tagName==="TEXTAREA")return;
  if(e.key==="Escape"){sel=null;drawStart=null;drawPreview=null;setTool("select");render();}
  if(e.key==="v")setTool("select");if(e.key==="l")setTool("line");if(e.key==="r")setTool("rect");if(e.key==="t")setTool("text");if(e.key==="d")setTool("dimension");if(e.key==="b")setTool("barrier");
  if(e.key==="z"&&(e.ctrlKey||e.metaKey)){e.preventDefault();undoAction();}
  if((e.key==="Delete"||e.key==="Backspace")&&!e.target.closest("input")){const cap=captures.find(c=>c.id===activeCapture);if(cap&&cap.type==="schema"&&selectedShape!==null&&drawTool==="select"){cap.shapes.splice(selectedShape,1);selectedShape=null;render();syncToMainForm();}}
});
function undoAction(){const cap=captures.find(c=>c.id===activeCapture);if(!cap)return;if(cap.type==="schema"){if(cap.shapes.length)cap.shapes.pop();else if(cap.signs.length)cap.signs.pop();selectedShape=null;}else{if(cap.signs.length)cap.signs.pop();}render();syncToMainForm();}
function clearAll(){const cap=captures.find(c=>c.id===activeCapture);if(!cap)return;const has=cap.type==="schema"?(cap.shapes.length||cap.signs.length):cap.signs.length;if(!has||!confirm("Tout effacer ?"))return;if(cap.type==="schema"){cap.shapes=[];cap.signs=[];selectedShape=null;}else cap.signs=[];render();syncToMainForm();}

// ═══════════════════════════════════════
// EXPORT + SYNC
// ═══════════════════════════════════════
function renderCaptureToPNG(cap){
  if(cap.type==="schema"){const gw=gridOn;gridOn=false;const ps=selectedShape;selectedShape=null;const pp=drawPreview;drawPreview=null;renderSchema(cap);const du=cvs.toDataURL("image/png");gridOn=gw;selectedShape=ps;drawPreview=pp;render();return Promise.resolve(du);}
  return new Promise(ok=>{const img=new Image();img.onload=()=>{const tc=document.createElement("canvas");tc.width=img.width;tc.height=img.height;const tx=tc.getContext("2d");tx.drawImage(img,0,0);cap.signs.forEach(s=>{const si=cache[s.id];if(!si)return;tx.save();tx.translate(s.x,s.y);tx.rotate((s.angle||0)*Math.PI/180);tx.drawImage(si,-s.size/2,-s.size/2,s.size,s.size);tx.restore();});ok(tc.toDataURL("image/png"));};img.src=cap.dataUrl;});
}
async function exportAll(){if(!captures.length){alert("Aucun plan.");return;}for(let i=0;i<captures.length;i++){if(captures[i].type==="schema"){activeCapture=captures[i].id;cvs.width=1200;cvs.height=900;}const png=await renderCaptureToPNG(captures[i]);const a=document.createElement("a");a.download=`${captures[i].type==="schema"?"PlanCote":"Signalisation"}_${i+1}_${new Date().toISOString().slice(0,10)}.png`;a.href=png;a.click();await new Promise(r=>setTimeout(r,300));}if(activeCapture){const c=captures.find(c=>c.id===activeCapture);if(c)selectCapture(c.id);}}
async function syncToMainForm(){try{const data=[];for(const cap of captures){const png=await renderCaptureToPNG(cap);const comp=await compressDataUrl(png,800);data.push({label:cap.label,dataUrl:comp,signCount:cap.signs.length,type:cap.type||"screenshot"});}localStorage.setItem("cile_signalisation_plans",JSON.stringify(data));}catch(e){console.warn("Sync:",e);}}
function compressDataUrl(du,maxW){return new Promise(ok=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>maxW){h=Math.round(h*(maxW/w));w=maxW;}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);ok(c.toDataURL("image/jpeg",.75));};img.src=du;});}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
const urlP=new URLSearchParams(location.search);
if(urlP.get("addr"))document.getElementById("addr").value=urlP.get("addr");
prerender().then(()=>{renderSignAccordion();renderGallery();render();if(urlP.get("addr"))setTimeout(goAddr,300);showTab("both");setMode("cartes");});
</script>
